# kind4 — un-migrated single-precision baseline.
#
# Not a real migration target: S/C are the standard single-precision
# entry points already in the upstream BLAS/LAPACK source tree, not
# something the migrator produces. `migrator stage --target kind4`
# never loads this file — staging short-circuits on the raw target
# name to the baseline path (no per-library migration; staging only
# copies upstream sources, tests/, and writes target_config.cmake
# with LIB_PREFIX="" so tests/<lib>/CMakeLists.txt links the standard
# archive directly). The file carries only the loader-required
# minimum so subcommands that do resolve targets by name
# (migrate / diverge / ...) accept `--target kind4`.

name: kind4

types:
  real: "REAL(KIND=4)"
  complex: "COMPLEX(KIND=4)"

literals:
  mode: kind_suffix
  kind_suffix: 4
  real_constructor: null
  complex_constructor: null

intrinsics:
  mode: add_kind

prefixes:  # only the R (real) and C (complex) families are remapped
  R: S
  C: C

module: null
known_constants: {}
la_constants_map: {}
la_constants_suffix: ""
