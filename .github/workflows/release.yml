name: Release Libraries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Stage migrated sources (one per target) ──────────────────────
  stage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [kind16, kind10, multifloats]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Extract vendored sources
        run: |
          cd extern
          [ -d lapack-3.12.1 ] || tar xzf lapack-3.12.1.tar.gz
          [ -d scalapack-2.2.3 ] || tar xzf scalapack-2.2.3.tar.gz

      - name: Stage ${{ matrix.target }}
        run: |
          uv run python -m migrator stage \
            ${{ github.workspace }}/staging-${{ matrix.target }} \
            --target ${{ matrix.target }}

      - name: Convergence report
        run: |
          RECIPES=(blas blacs lapack ptzblas pbblas pblas scalapack scalapack_c)
          {
            echo "## Convergence report: \`${{ matrix.target }}\`"
            echo ""
            for lib in "${RECIPES[@]}"; do
              RECIPE="codegen/recipes/${lib}.yaml"
              OUTDIR="${{ github.workspace }}/staging-${{ matrix.target }}/${lib}/src"
              if [ ! -d "$OUTDIR" ]; then
                continue
              fi
              echo "### ${lib}"
              echo '```'
              uv run python -m migrator diverge "$RECIPE" \
                --target ${{ matrix.target }} --full 2>&1 || true
              echo '```'
              echo ""
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload staged sources
        uses: actions/upload-artifact@v7
        with:
          name: staging-${{ matrix.target }}
          path: staging-${{ matrix.target }}/
          retention-days: 1

  # ── Build matrix: target x compiler x MPI ────────────────────────
  build:
    needs: stage
    runs-on: ubuntu-latest
    env:
      # The kind10 + gfortran-15 + intelmpi slot also runs ctest as
      # the release workflow's one correctness signal. We pick
      # kind10 + gfortran-15 + intelmpi because Intel MPI is the
      # canonical MPI for the migrated stack — the libmpiseq path
      # was written against Intel MPI's handle ABI, so
      # OpenMPI/MPICH-linked _seq tests fail to resolve
      # ``ompi_mpi_byte`` etc. at link time. The non-_seq surface
      # should work on any MPI; extending the test coverage to
      # kind16 / multifloats / openmpi / mpich is a known follow-up.
      IS_TEST_SLOT: ${{ matrix.target == 'kind10' && matrix.compiler.name == 'gfortran-15' && matrix.mpi.name == 'intelmpi' }}
      # The seq column builds against the Intel-MPI toolchain too:
      # MUMPS_LIBSEQ_RELEASE hard-requires it (libmpiseq's stub ABI),
      # even though the shipped archives link no real MPI.
      USES_INTEL_MPI: ${{ matrix.mpi.name == 'intelmpi' || matrix.mpi.name == 'seq' }}
    strategy:
      fail-fast: false
      matrix:
        target: [kind16, kind10, multifloats]
        # v0.2.0 release matrix: gfortran-only. ifx and flang surface
        # several pre-existing migrator and per-MPI ABI issues
        # (mpiseq KIND-typing on ifx, mpich+oneAPI 2025 mpi.h shadowing,
        # flang's lack of -ffat-lto-objects, mumps mpif.h scan failure
        # on flang, etc.) that need targeted fixes before they can be
        # promoted to release artifacts. Tracked as a follow-up.
        compiler:
          - { name: gfortran-12,  fc: gfortran-12,   cc: gcc-12,    cxx: g++-12,      pkg: gcc-12 g++-12 gfortran-12 }
          - { name: gfortran-15,  fc: gfortran-15,   cc: gcc-15,    cxx: g++-15,      pkg: gcc-15 g++-15 gfortran-15 }
        mpi:
          - { name: openmpi,  pkg: libopenmpi-dev }
          - { name: mpich,    pkg: libmpich-dev }
          - { name: intelmpi }
          # seq: the MUMPS stack linked against the in-tree libmpiseq
          # stub instead of a real MPI (MUMPS_LIBSEQ_RELEASE=ON).
          # MPI-dependent archives are tagged -seq and libmpiseq is
          # installed; consumers run single-process with no MPI at all.
          - { name: seq }

    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            cmake/

      - name: Download staged sources
        uses: actions/download-artifact@v7
        with:
          name: staging-${{ matrix.target }}
          path: staging/

      - name: Install GCC (gfortran)
        if: startsWith(matrix.compiler.name, 'gfortran')
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler.pkg }}

      - name: Install Intel oneAPI compilers
        if: startsWith(matrix.compiler.name, 'ifx')
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          YEAR=$(echo "${{ matrix.compiler.oneapi }}" | cut -d. -f1)
          MINOR=$(echo "${{ matrix.compiler.oneapi }}" | cut -d. -f2)
          sudo apt-get install -y \
            intel-oneapi-compiler-fortran-${YEAR}.${MINOR} \
            intel-oneapi-compiler-dpcpp-cpp-${YEAR}.${MINOR}

      - name: Install LLVM Flang 20
        if: matrix.compiler.name == 'flang-20'
        run: |
          wget -O- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main"
          sudo apt-get update
          sudo apt-get install -y flang-20 clang-20 libomp-20-dev

      - name: Install MPI (apt)
        if: matrix.mpi.pkg != ''
        run: sudo apt-get install -y ${{ matrix.mpi.pkg }}

      - name: Install Intel MPI
        if: env.USES_INTEL_MPI == 'true' && !startsWith(matrix.compiler.name, 'ifx')
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mpi-devel

      - name: Install Intel MPI (with oneAPI compilers)
        if: env.USES_INTEL_MPI == 'true' && startsWith(matrix.compiler.name, 'ifx')
        run: |
          sudo apt-get install -y intel-oneapi-mpi-devel

      - name: Install fypp (needed by multifloats and tests)
        if: matrix.target == 'multifloats' || env.IS_TEST_SLOT == 'true'
        run: pipx install fypp

      # Source Intel oneAPI's setvars.sh once and forward the resulting
      # environment to subsequent steps via $GITHUB_ENV instead of
      # re-sourcing it inside every cmake invocation. Only vars that
      # setvars.sh actually adds/changes are forwarded.
      - name: Setup Intel oneAPI environment
        if: matrix.compiler.oneapi != '' || env.USES_INTEL_MPI == 'true'
        run: |
          env | sort > /tmp/env.before
          source /opt/intel/oneapi/setvars.sh > /dev/null
          env | sort > /tmp/env.after
          comm -13 /tmp/env.before /tmp/env.after >> "$GITHUB_ENV"

      - name: Setup Intel MPI compiler shims
        if: env.USES_INTEL_MPI == 'true' && matrix.compiler.oneapi == ''
        run: |
          {
            echo "I_MPI_F90=${{ matrix.compiler.fc }}"
            echo "I_MPI_CC=${{ matrix.compiler.cc }}"
            echo "I_MPI_CXX=${{ matrix.compiler.cxx }}"
          } >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S staging -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_Fortran_COMPILER=${{ matrix.compiler.fc }} \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DMIGRATOR_BUILD_TESTS=${{ env.IS_TEST_SLOT == 'true' && 'ON' || 'OFF' }} \
            -DMUMPS_LIBSEQ_RELEASE=${{ matrix.mpi.name == 'seq' && 'ON' || 'OFF' }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run ctest
        if: env.IS_TEST_SLOT == 'true'
        run: ctest --test-dir build -j$(nproc) --output-on-failure

      - name: Upload ctest log on failure
        if: failure() && env.IS_TEST_SLOT == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ctest-kind10-gfortran-15-intelmpi-LastTest
          path: |
            build/Testing/Temporary/LastTest.log
            build/Testing/Temporary/LastTestsFailed.log
          retention-days: 7

      - name: Install
        run: cmake --install build

      # These files must stay byte-identical across every matrix combo
      # (no matrix variables): they overlap when the release job merges
      # all per-combo tarballs into the combined archive. The Markdown
      # user guide ships as-is; rendered HTML lives on GitHub Pages,
      # not in the release.
      - name: Add documentation (Markdown user guide)
        run: |
          DOCDIR=install/share/doc/eplinalg
          mkdir -p "$DOCDIR"
          cp README.md LICENSE CHANGELOG.md "$DOCDIR/"
          (cd doc && find user -name '*.md' -print0 | tar cf - --null -T -) \
            | tar xf - -C "$DOCDIR"

      - name: Package
        run: |
          cd install
          ARCHIVE="${{ matrix.target }}-${{ matrix.compiler.name }}-${{ matrix.mpi.name }}-linux-x86_64"
          tar czf ${{ github.workspace }}/${ARCHIVE}.tar.gz .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}.tar.gz
          retention-days: 7

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
          pattern: '*-*-*-linux-x86_64'

      - name: Collect tarballs
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ls -la release/

      - name: Build combined eplinalg tarball
        # Merge every per-combo tarball into one ``eplinalg-vX.Y.Z-...``
        # archive that holds all targets × compilers × MPIs in a single
        # install tree. Per-combo archives stay alongside it for
        # consumers who only need one variant. Since every library is
        # tagged with ``-<compiler>[-<mpi>]`` in its filename, the
        # per-tarball extracts don't collide; the only paths that
        # overlap across tarballs are CMake Config.cmake files and
        # mod-format-tagged .mod files, both of which are identical
        # across the same logical configuration.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="eplinalg-v${VERSION}-linux-x86_64"
          mkdir -p combined
          for t in release/*.tar.gz; do
            echo "  extracting $(basename "$t")"
            tar -xzf "$t" -C combined
          done
          tar -czf "release/${ARCHIVE}.tar.gz" -C combined .
          ls -lh "release/${ARCHIVE}.tar.gz"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.tar.gz
          generate_release_notes: true
          body: |
            ## Extended-precision numerical libraries

            Pre-built static libraries for Linux x86-64.

            ### Combined archive

            ``eplinalg-vX.Y.Z-linux-x86_64.tar.gz`` bundles every per-combo
            archive (target × compiler × MPI) into a single install
            tree. Every library file is tagged with its compiler tag
            and (for MPI-dependent libraries) its MPI flavor + version
            in the filename, so all variants coexist without filename
            collisions. Extract once and select the variant you want
            via ``find_package(<lib>)`` — the generated Config.cmake
            picks the matching targets file by detecting the consumer's
            compiler and MPI.

            Use the per-combo tarballs when you only need a single
            variant and want a smaller download.

            ### Documentation

            Every archive carries the Markdown user guide under
            ``share/doc/eplinalg/`` (README, LICENSE, CHANGELOG, and
            ``user/*.md``). Rendered HTML documentation:
            https://kyungminlee.github.io/eplinalg/

            ### Targets
            | Target | Description | Prefix |
            |--------|-------------|--------|
            | `kind16` | 128-bit quad precision (`REAL(KIND=16)`) | Q/X |
            | `kind10` | 80-bit extended precision (`REAL(KIND=10)`) | E/Y |
            | `multifloats` | Double-double (`float64x2`) | M/W |

            ### Compilers
            | Compiler | Tag |
            |----------|-----|
            | GCC/gfortran 12 | `gfortran-12` |
            | GCC/gfortran 15 | `gfortran-15` |

            Intel oneAPI (ifx) and LLVM Flang are not yet covered by
            the release matrix — pre-existing migrator and per-MPI
            ABI work is needed before they can be promoted. Track the
            follow-up at the repo issues page.

            ### MPI Implementations
            MPI-dependent libraries (BLACS, PBLAS, PBBLAS, ScaLAPACK, ScaLAPACK_C)
            are built with each MPI implementation:

            | MPI | Tag |
            |-----|-----|
            | OpenMPI | `openmpi` |
            | MPICH | `mpich` |
            | Intel MPI | `intelmpi` |
            | none (sequential libmpiseq) | `seq` |

            The `seq` archives link the MUMPS stack against the bundled
            `libmpiseq` stub instead of a real MPI: single-process
            solves with no MPI installation or `mpiexec` needed.

            ### Installation
            ```bash
            tar xzf kind16-gfortran-15-openmpi-linux-x86_64.tar.gz -C /usr/local
            ```

            Libraries are compiler-tagged (e.g. `libqblas-gfortran-15.a`).
            Fortran modules are in `lib/fmod/<mod-tag>/`.
