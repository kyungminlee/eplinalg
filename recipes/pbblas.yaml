# PBBLAS -- distributed PB-BLAS kernels used by PBLAS.
# Pure Fortran fixed-form files. These call BLACS communication
# routines (DGEBR2D, DGEBS2D, etc.) and serial BLAS routines.
library: pbblas
language: fortran
source_dir: external/scalapack-2.2.3/PBLAS/SRC/PBBLAS
extensions: [.f]

depends:
  - blas.yaml
  - blacs.yaml
  # PBBLAS' pb*tran / pb*trnv / pb*trsrt / pb*trget / pb*trst1 call
  # NUMROC / ICEIL / ILCM. These are precision-independent integer
  # helpers that live in ScaLAPACK's TOOLS/ tree but are hosted in
  # their own tiny library so PBBLAS' downstreams (e.g. tests/pbblas)
  # don't have to drag in libqscalapack to resolve them.
  - scalapack_tools.yaml

# PBBLAS files also reference PTZBLAS routines (DAGEMV, etc.)
extra_symbol_dirs:
  - external/scalapack-2.2.3/PBLAS/SRC/PTZBLAS

skip_files: []

# Task 44: privatize the MKL-colliding, family-independent support
# symbols (blacs_*/Cblacs_*/BI_*, PB_C*, TOOLS/REDIST helpers, sltimer,
# pxerbla, ...) by renaming them name -> ep_name in the migrated output.
# eplinalg's Netlib-derived engine and MKL export identical names with
# incompatible internal ABIs (BLACBUFF 48 vs 56 bytes); one process-wide
# definition per name collapses the two engines and SIGSEGVs at np>=2 in
# either link order. The manifest is shared across the whole extended
# stack (uniform prefix keeps the commons byte-identical across
# mw/qx/ey) and the nm audit gate reads the same file.
privatize_symbols: privatize_ep_symbols.txt
