skip_files:
  # PJLAENV / PILAENVX are replaced in the migrated archive by their
  # *_EP variants (see extras/p{jl,il}aenv*_ep.f and the extra_renames
  # entries below). Skip the upstream files so they don't get migrated
  # to duplicate symbols.
  - PJLAENV
  - PILAENVX
  # Genuine-double mixed-precision TOOLS helpers (dddot_, dsnrm2_,
  # dsasum_, dscasum_, dscnrm2_). The extended (e/q/m) routines never
  # call these — verified dead in the migrated archive (defined,
  # referenced_by=0) — and MKL + the plain ``libscalapack`` both provide
  # them. Migrating a copy into the prefixed archive would multiply-
  # define against MKL in the extended-MKL link (the disjointness this
  # task enforces; see recipes/blacs.yaml for the sibling BLACS split).
  - DDDOT
  - DSNRM2
  - DSASUM
  - DSCASUM
  - DSCNRM2

# Family-independent TOOLS routines pinned to ``libscalapack_common``.
# These are the descriptor / index / grid-init / timer / integer-family
# helpers that carry no floating type (descinit_, indxg2l_, chk1mat_,
# sl_init_, the pi* integer accessors, ilacpy_, ...). The symbol scanner
# leaves them in PRECISION, so a copy leaks into every prefixed archive
# (libescalapack / libqscalapack / ...) and collides with the identical
# routine MKL's ScaLAPACK provides in the extended-MKL link. One copy in
# the shared ``scalapack_common`` serves e/y, q/x and m/w; the consumer
# drops ``scalapack_common`` when MKL supplies that layer and links it in
# the noMKL columns (same drop-when-MKL profile as ``blacs_common``).
# Match is on file stem (uppercased); listed without the trailing ``_``.
force_common:
  # descriptor / conversion / validation
  - chk1mat
  # pchkxmat.f defines PCHK1MAT_, PCHK2MAT_ and GLOBCHK_ (one file, three
  # entry points) — match the file stem, not the symbol names.
  - pchkxmat
  - desc_convert
  - descinit
  - descset
  - npreroc
  # precision-independent integer helpers (folded in from scalapack_tools)
  - iceil
  - ilcm
  - numroc
  # index arithmetic
  - indxg2l
  - indxg2p
  - indxl2g
  - infog1l
  - infog2l
  # grid-init + timers (SL_init.f, sltimer.f)
  - SL_init
  - slboot
  - slcombine
  - sldisable
  - slenable
  - slinquire
  - sltimer
  # integer-family PBLAS-level accessors (pi* — no floating type)
  - ilacpy
  - pichekpad
  - picol2row
  - pielget
  - pielset
  - pielset2
  - pifillpad
  - pilaprnt
  - pirow2col
  - pitreecomb

# Override D/Z-first canonical selection for pairs whose D/Z half
# needs to win convergence against a sibling that doesn't carry the
# corresponding patch (the canonical-rank picker doesn't recognize
# ScaLAPACK's pd*/pz* prefix shape, so without an explicit pin it
# sorts the C/S copy alphabetically first and the un-fixed body
# becomes canonical).
prefer_source:
  # Pin the D/Z half so the bug-fixed PD/PZ patches for pdlanhs.f /
  # pzlanhs.f win convergence against an un-patched PCLANHS sibling.
  - PDLANHS
  - PZLANHS
  # PDGEEQU/PZGEEQU patches only fix the D/Z half.
  - PDGEEQU
  - PZGEEQU
  # PDPOSVX/PZPOSVX patches fix the LWMIN-too-small upstream bug.
  - PDPOSVX
  - PZPOSVX
  # PDLARZB/PZLARZB patches fix the PBDTRAN/PBZTRAN LDC mismatch
  # (M+ICOFFV vs L+ICOFFV).
  - PDLARZB
  - PZLARZB
  # PDORMRZ/PZUNMRZ patches fix the post-loop-condition copy-paste
  # bug (post-loop should be the complement of pre-loop, not a duplicate).
  - PDORMRZ
  - PZUNMRZ
  # PDLARZ/PZLARZ patches fix the MPV/NQV undersizing and the DAXPY
  # stride bug.
  - PDLARZ
  - PZLARZ
  # PZLARZC patch fixes the same buffer/stride bugs in the Q**H
  # variant; pin to dominate PCLARZC.
  - PZLARZC
  # Pin the Z halves so the patches for PZHEEVD (PCHK2MAT parameter-
  # index 11→12) and PZUNMBR (EXTERNAL list PCHK1MAT→PCHK2MAT) win
  # convergence over the un-patched PCHEEVD/PCUNMBR.
  - PZHEEVD
  - PZUNMBR
  # PCHK?MAT parameter-position fixes (2026-05-08 sweep) — pin the
  # patched D/Z halves so they win convergence against the still-buggy
  # S/C halves.
  - PDSYEVR
  - PZHEEVR
  - PDSYGVX
  - PZHEGVX
  - PDTRORD
  # LWORK sentinel-check + lascl CFROM/CTO param-position fixes (2026-05-09)
  - PDPTTRS
  - PZPTTRS
  - PDPBTRSV
  - PZPBTRSV
  - PDLASCL
  - PZLASCL
  # PDORMRZ / PZUNMRZ are already pinned above for the post-loop-condition
  # copy-paste fix.

# Mirror the scalapack_c.yaml rename for pdlaiectb_/pdlaiectl_: the
# Fortran callers PDSTEBZ / PDSYEVX / PDSYGVX / PZHEEVX / PZHEGVX
# directly reference these C helpers, so the migrated callers (pqstebz
# etc.) need to call into the extended-precision clones rather than
# the standard-precision originals (which take double*, not QREAL*).
extra_renames:
  PDLAIECTB: P{RPU}LAIECTB
  PDLAIECTL: P{RPU}LAIECTL
  # Reroute every PJLAENV call site to PJLAENV_EP, the extended-
  # precision-aware variant shipped from recipes/scalapack/extras/.
  # Upstream PJLAENV's strict S/D/C/Z gate returns uninitialised for
  # migrated names like 'PESYTTRD' / 'PXHETTRD'. PJLAENV is added to
  # skip_files below so the upstream pjlaenv.f isn't migrated
  # (otherwise its FUNCTION PJLAENV declaration would be renamed to
  # FUNCTION PJLAENV_EP and clash with our extras file).
  PJLAENV: PJLAENV_EP
  PILAENVX: PILAENVX_EP

# Patches applied to staged sources before migration (one per upstream
# bug). See doc/upstream-bugs/scalapack.md for the bug catalogue and
# doc/archive/refactor-20260509.md for the patch convention.
#
# Bug summaries:
#   lanhs (NPROW=1 underestimate + IAROW double-advance)
#   geequ column-scale wrong axis
#   posvx LWMIN too small
#   pdlarzb PBDTRAN N-arg vs LV-buffer mismatch
#   ormrz/unmrz post-loop condition + L-validation bug
#   larz buffer undersizing + DAXPY stride
#   pzlarzc SIDE='L' missing ZLACGV; ZGERC vs ZGERU
#   pzheevd PCHK2MAT index + LIWORK validation
#   pzunmbr EXTERNAL declares PCHK1MAT body calls PCHK2MAT
#   bdtrexc XERBLA reports 'DTREXC' typo
#   {d,z}pttrsv XERBLA reports '?PTTRS' instead of '?PTTRSV'
#   {syevr,heevr} DESCZ POS0 21 → 19
#   {sygvx,hegvx} N POS0 4 → 5
#   pdtrord POS0 off by +1
#   {pttrs,pbtrsv} LWORK sentinel INFO off-by-one
#   {lascl} CFROM/CTO INFO codes inherited from LAPACK
