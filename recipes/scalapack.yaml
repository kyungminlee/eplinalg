# M/W, the V→VCOPY collisions in pXlahqr/pXlaqr1 and the T→TSCAL
# collision in pvlattrs no longer occur — the renamed BLAS routines
# (WCOPY, MSCAL) don't shadow any local in the affected files.


# Convergence whitelist (Phase D, doc/archive/refactor-20260509.md).
# Most are upstream MINRGP/larre2/larrf2 tuning splits and larzc/larzb/
# stebz/lanhs algorithmic asymmetries. See doc/archive/convergence-20260507.md
# §scalapack and doc/upstream-bugs/scalapack.md.
expected_divergences:
  # Bugs that remain asymmetric (genuine upstream design split):
  - BDLAEXC          # bdlaexc/bslaexc: 1.0E1 vs TEN parameter constant
  - DLAMSH           # constant-comparison drift
  - DLARRE2          # PERT=4 vs PERT=8 + RTL formula split
  - DLARRE2A         # ditto
  - DLARRF2          # TWO*EPS vs FOUR*EPS multiplier
  - DSTEGR2          # MINRGP=3e-3 vs 1e-3
  - DSTEGR2A         # ditto
  - DSTEGR2B         # ditto
  - PCGESVD          # per-precision WPSLANGE/WPDLANGE/WPCLANGE rename
  - PCHETTRD         # Hermitian vs symmetric algorithmic split
  - PCLAWIL          # call-shape divergence
  - PCPOTF2          # function vs subroutine restructure across halves
  - PCTREVC          # algorithmic split
  - PDLACON          # declaration reorder
  - PDLAQR3          # MPI_WTIME external + LWK8 split
  - PDLAWIL          # call-shape divergence
  - PDSTEBZ          # IEFLAG branch restructure (D-only)
  - PDSYTTRD         # CONJTOPH vs TTOPH (Hermitian vs symmetric)
  - PDTRSEN          # multi-line vs single-line IF
  - PSGESVD          # per-precision WPS/WPD rename mirror of PCGESVD
  - PCHEEV           # INTEGER decl content/ordering drift in @SIZE names
  - PCLATTRS         # REAL XMAX(1) declaration line-position swap
  - PZLARZ           # TAULOC( 1 ) vs TAULOC(1,1,…) comparer paren collapse
  - PZLARZC          # ditto
  - PDGESVD          # WPDLANGE mirror name (canonical from D-half pref)

# Patches whose sibling half is missing — known upstream-asymmetric
# fixes that we haven't yet translated. Empty now: every D/Z patch
# has its sibling S/C patch (2026-05-11 symmetric-fix sweep).
asymmetric_patches:
  # pzunmbr fixes PCHK1MAT→PCHK2MAT in EXTERNAL list; pcunmbr already
  # has PCHK2MAT upstream, so no sibling patch is needed.
  - pzunmbr.f.patch
  # 2026-05-11 audit one-sided fixes (sibling half is correct upstream):
  - pzungql.f.patch    # pcungql already has PB_TOPSET
  - pzunml2.f.patch    # pcunml2 already has PB_TOPSET
  - pdsyevd.f.patch    # pssyevd already has LIWORK.EQ.-1 branch
  - pslaed3.f.patch    # pdlaed3 already has INFO init + guard
