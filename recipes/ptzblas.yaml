# PTZBLAS -- trapezoidal BLAS kernels used by PBLAS.
# Pure Fortran fixed-form files with S/D/C/Z precision prefixes.
# They call serial BLAS routines (dgemv, daxpy, etc.) but not MPI.
library: ptzblas
language: fortran
source_dir: external/scalapack-2.2.3/PBLAS/SRC/PTZBLAS
extensions: [.f]

depends:
  - blas.yaml

# PTZBLAS's zvvdotc.f / zvvdotu.f kernels call ZZDOTC / ZZDOTU, which are
# wrapper routines defined in ScaLAPACK's TOOLS/ directory. Scanning
# TOOLS puts ZZDOTC/ZZDOTU into the rename map so the call sites get
# rewritten to the precision-family equivalent (XDOTC/XDOTU at kind16,
# EDOTC/EDOTU at kind10, DDZDOTC/DDZDOTU at multifloats). The two
# wrapper sources themselves are pulled in via extra_migrate_files so
# the referenced symbol is defined in the migrated PTZBLAS library —
# without migrating the rest of TOOLS/, which belongs to ScaLAPACK.
extra_symbol_dirs:
  - external/scalapack-2.2.3/TOOLS

extra_migrate_files:
  - external/scalapack-2.2.3/TOOLS/zzdotc.f
  - external/scalapack-2.2.3/TOOLS/zzdotu.f

skip_files: []

# Task 44: privatize the MKL-colliding, family-independent support
# symbols (blacs_*/Cblacs_*/BI_*, PB_C*, TOOLS/REDIST helpers, sltimer,
# pxerbla, ...) by renaming them name -> ep_name in the migrated output.
# eplinalg's Netlib-derived engine and MKL export identical names with
# incompatible internal ABIs (BLACBUFF 48 vs 56 bytes); one process-wide
# definition per name collapses the two engines and SIGSEGVs at np>=2 in
# either link order. The manifest is shared across the whole extended
# stack (uniform prefix keeps the commons byte-identical across
# mw/qx/ey) and the nm audit gate reads the same file.
privatize_symbols: privatize_ep_symbols.txt
