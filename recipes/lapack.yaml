# Patches whose sibling half upstream is genuinely correct or has a
# different bug shape — periodically review whether a sibling patch
# could be added. See doc/refactor-20260509.md.
asymmetric_patches:
  # Patches whose S/C sibling is already correct upstream (bug only
  # exists on D/Z half). Audited 2026-05-11; verified by inspecting
  # the sibling's source.
  - dgejsv.f.patch         # sgejsv already has LWORK-N
  - dtrsyl3.f.patch        # strsyl3 has no equivalent
  - ztrsyl3.f.patch        # (and ctrsyl3 had its own patch)
  - ctrsyl3.f.patch        # (and ztrsyl3 had its own patch)
  - dlaqp2.f.patch         # slaqp2 already correct
  - zhetrf_aa.f.patch      # chetrf_aa already correct (no CGEMV)
  - zlahef_aa.f.patch      # clahef_aa already correct (no CGEMM)
  - zgbrfsx.f.patch        # cgbrfsx already correct
  - dlaswlq.f.patch        # slaswlq already correct
  - zla_syrfsx_extended.f.patch  # cla_syrfsx_extended already correct
  - dorgr2.f.patch         # sorgr2 already correct
  - zgelss.f.patch         # cgelss already correct

