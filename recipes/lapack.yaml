library: lapack
language: fortran
source_dir: external/lapack-3.12.1/SRC
extensions: [.f, .f90, .F90]

symbols:
  method: scan_source

depends:
  - blas.yaml
  # XBLAS extended-precision routines are called from the LAPACK
  # *la_*rfsx_extended iterative-refinement family (qla_gbrfsx_extended,
  # xla_gerfsx_extended, ...). Declaring xblas as a dep brings its
  # BLAS_{s,d,c,z}*_x symbols into the classifier's universe, so the
  # position-5 precision-letter family (BLAS_DGBMV_X ↔ BLAS_SGBMV_X,
  # BLAS_ZGEMV_X ↔ BLAS_CGEMV_X, ...) is paired and renamed to the
  # target prefix (BLAS_QGBMV_X / BLAS_XGEMV_X for kind16, etc.) by the
  # standard classifier — no special-case rename rule needed. Without
  # this dep the call sites kept their D/Z form and silently linked
  # against fp64 XBLAS inside a quad/multifloats build.
  - xblas.yaml

# INSTALL directory contains slamch/dlamch, sroundup_lwork, etc.
extra_symbol_dirs:
  - external/lapack-3.12.1/INSTALL

# dlamch is called from dozens of LAPACK SRC routines
# (dlascl, dsyev, dgesvd, dgetrf2, …). The file lives in
# INSTALL/ alongside test programs, timer-routine variants, and an
# already-in-BLAS copy of lsame.f — so we pull just this one into the
# migrated library instead of sweeping the whole directory.
#
# droundup_lwork.f is intentionally NOT migrated: at any kind ≥ 8 the
# wrapper is dead code (the float→int round-trip bug it guards only
# bites at kind4, where 32-bit LWORK can exceed the 24-bit mantissa).
# The migrator's _strip_roundup_lwork post-pass elides every call
# site, so no LAPACK routine references the symbol after retarget.
extra_migrate_files:
  - external/lapack-3.12.1/INSTALL/dlamch.f
  # ILAENV_EP / ILAENV2STAGE_EP / IPARAM2STAGE_EP — extended-precision-
  # aware variants of the LAPACK environmental-inquiry helpers. Lives
  # under recipes/lapack/extras/ rather than external/ because they
  # are new symbols introduced by the migrator (no upstream
  # counterpart). The migrator post-pass automatically rewrites every
  # call site of ILAENV / ILAENV2STAGE / IPARAM2STAGE in migrated
  # files to the *_EP variants — sidestepping the upstream S/D/C/Z
  # precision-letter gate that returns uninitialised for migrated
  # routine names like 'EGEMM'/'PESYTTRD'/'YHETRD'.
  - recipes/lapack/extras/ilaenv_ep.f
  - recipes/lapack/extras/ilaenv2stage_ep.f
  - recipes/lapack/extras/iparam2stage_ep.F

prefix:
  style: direct

# Source overrides — patched upstream bodies that go through the normal
# migration pipeline. Overrides displace the same-named upstream files
# in source_dir before the migrator scans them.
#
# {s,d,c,z}orbdb3 / unbdb3: upstream LAPACK 3.12.1 passes LDX11 as the
# INCY argument to the early DROT/SROT/CSROT/ZDROT call inside the
# I=2..M-P main loop. The rotated row sits in X21, so INCY must be
# LDX21. When LDX11 /= LDX21 (typical when M-P < P, the actual orbdb3
# regime) the upstream form strides past the X21 buffer and corrupts
# heap — manifests as munmap_chunk: invalid pointer on the next free.
# Identical bug across all four precision variants. Patches change
# only that single argument.
source_overrides:
  dorbdb3.f: lapack/source_overrides/dorbdb3.f
  sorbdb3.f: lapack/source_overrides/sorbdb3.f
  zunbdb3.f: lapack/source_overrides/zunbdb3.f
  cunbdb3.f: lapack/source_overrides/cunbdb3.f
  # Upstream typo: zupmtr.f declares EXTERNAL ZLARF1 but calls ZLARF1L.
  # The dead ZLARF1 symbol slips through the family-prefix renamer and
  # leaks into xupmtr.f as a stale Z-prefix, diverging from cupmtr's
  # consistent CLARF1L. Patch fixes the EXTERNAL line.
  zupmtr.f: lapack/source_overrides/zupmtr.f
  # Dead ONE PARAMETER block: D/Z halves declare COMPLEX*16/DOUBLE PRECISION
  # ONE but never reference it, while the matching C/S halves omit the
  # declaration entirely. The kind16 retarget faithfully preserves the
  # asymmetry, producing 19 cosmetic divergences. Overrides strip the dead
  # block so D↔S and Z↔C halves converge structurally.
  zgehd2.f: lapack/source_overrides/zgehd2.f
  zgelq2.f: lapack/source_overrides/zgelq2.f
  zgeql2.f: lapack/source_overrides/zgeql2.f
  zgeqr2.f: lapack/source_overrides/zgeqr2.f
  zgeqr2p.f: lapack/source_overrides/zgeqr2p.f
  zgerq2.f: lapack/source_overrides/zgerq2.f
  zunm2l.f: lapack/source_overrides/zunm2l.f
  zunm2r.f: lapack/source_overrides/zunm2r.f
  zunml2.f: lapack/source_overrides/zunml2.f
  zunmr2.f: lapack/source_overrides/zunmr2.f
  dgehd2.f: lapack/source_overrides/dgehd2.f
  dgelq2.f: lapack/source_overrides/dgelq2.f
  dgeql2.f: lapack/source_overrides/dgeql2.f
  dgeqr2.f: lapack/source_overrides/dgeqr2.f
  dgeqr2p.f: lapack/source_overrides/dgeqr2p.f
  dgerq2.f: lapack/source_overrides/dgerq2.f
  dorm2l.f: lapack/source_overrides/dorm2l.f
  dorm2r.f: lapack/source_overrides/dorm2r.f
  dorml2.f: lapack/source_overrides/dorml2.f
  # Literal-style mismatch: D/Z write 1.0D+00, S/C write 1.0 (no exponent).
  # The kind16 retarget produces 1.0E00_16 vs 1.0E0_16 — same value, diff
  # text. Normalize D/Z to 1.0D+0.
  dgeqrt2.f: lapack/source_overrides/dgeqrt2.f
  dgeqrt3.f: lapack/source_overrides/dgeqrt3.f
  zgeqrt2.f: lapack/source_overrides/zgeqrt2.f
  zgeqrt3.f: lapack/source_overrides/zgeqrt3.f
  # ggbak: D/Z list "INT, MAX" but C/S only "MAX" upstream. INT is a
  # built-in (the INTRINSIC declaration is advisory), so strip it from
  # D/Z to match C/S.
  zggbak.f: lapack/source_overrides/zggbak.f
  dggbak.f: lapack/source_overrides/dggbak.f
  # lansf/lanht: D/Z list MAX in INTRINSIC but neither half uses it in
  # body. Strip the dead MAX from D/Z to match S/C.
  dlansf.f: lapack/source_overrides/dlansf.f
  zlanht.f: lapack/source_overrides/zlanht.f
  # *bevd_2stage / hgeqz: C halves wrap WORK(1)=CMPLX(LWMIN); Z halves
  # write bare integer (auto-promoted on assignment to complex). Strip
  # the redundant cast from C halves.
  chbevd_2stage.f: lapack/source_overrides/chbevd_2stage.f
  cheevd_2stage.f: lapack/source_overrides/cheevd_2stage.f
  chgeqz.f: lapack/source_overrides/chgeqz.f
  # larfx: D/Z write "410 CONTINUE \n RETURN", S/C use single-line form
  # "410 RETURN". Collapse D/Z to one line.
  dlarfx.f: lapack/source_overrides/dlarfx.f
  zlarfx.f: lapack/source_overrides/zlarfx.f
  # zla_syrfsx_extended: real upstream bug — XERBLA reports
  # 'ZLA_HERFSX_EXTENDED' (Hermitian) inside the symmetric routine.
  # Fix the routine-name string. cla_syrfsx_extended is correct upstream.
  zla_syrfsx_extended.f: lapack/source_overrides/zla_syrfsx_extended.f
  # dgejsv: real upstream workspace bug. The "RSVEC && !LSVEC && !ALMORT"
  # branch calls DGESVJ with WORK(N+1) as the workspace start but passes
  # LWORK as the workspace size — overstating available space by N
  # elements. DGESVJ may write past WORK(LWORK). SGEJSV correctly passes
  # LWORK-N. Patch fixes the size argument. See doc/UPSTREAM_BUGS.md.
  dgejsv.f: lapack/source_overrides/dgejsv.f
  # dtrsyl3 / ztrsyl3: real upstream argument-validation gap. STRSYL3
  # checks LIWORK and LDSWORK against required workspace before XERBLA;
  # D/C/Z halves omit those checks. Patches add the guards (LIWORK only
  # exists on the real-precision halves; Z gets only the LDSWORK guard).
  # Diagnostic-only — both routines have a downstream "use unblocked
  # code" fallback when workspace is too small, so the absence of the
  # guard doesn't corrupt memory, just suppresses the INFO error.
  dtrsyl3.f: lapack/source_overrides/dtrsyl3.f
  ztrsyl3.f: lapack/source_overrides/ztrsyl3.f
  # zlarf1f: real upstream EXTERNAL omission. Body calls ZAXPY at lines
  # 287/293 but the EXTERNAL list omits it (D-half DLARF1F lists DAXPY
  # correctly). Advisory in Fortran (linker still resolves), but causes
  # convergence to flag the migrated x-half against the c-half sibling.
  zlarf1f.f: lapack/source_overrides/zlarf1f.f
  # dlaqp2: real upstream EXTERNAL typo. Declares DLARF but body calls
  # DLARF1F (line 222). slaqp2.f is correct (declares SLARF1F).
  dlaqp2.f: lapack/source_overrides/dlaqp2.f
  # zlahef_aa: stale ZGEMM in EXTERNAL. Body never calls ZGEMM (only
  # ZGEMV). clahef_aa.f correctly omits CGEMM.
  zlahef_aa.f: lapack/source_overrides/zlahef_aa.f
  # zhetrf_aa: stale ZGEMV in EXTERNAL. Body never calls ZGEMV (only
  # ZGEMM). chetrf_aa.f correctly omits CGEMV.
  zhetrf_aa.f: lapack/source_overrides/zhetrf_aa.f
  # zgbrfsx: missing ILATRANS in EXTERNAL. Body calls ILATRANS at
  # lines 511 and 561, but EXTERNAL only lists LSAME, ILAPREC. The
  # other three rfsx siblings (sgbrfsx, dgbrfsx, cgbrfsx) all declare
  # ILATRANS correctly — Z-half-only typo. Advisory in Fortran.
  zgbrfsx.f: lapack/source_overrides/zgbrfsx.f
  # dlaswlq: argument-validation gap. Line 221 tests NB.LT.0 (rejecting
  # only negative block sizes) where slaswlq.f tests NB.LE.0 (also
  # rejecting NB=0, which is invalid as a block size). With dlaswlq's
  # weaker check, NB=0 passes validation and triggers a divide-by-zero
  # or infinite loop in the block-loop downstream. Patch tightens the
  # check to match slaswlq.
  dlaswlq.f: lapack/source_overrides/dlaswlq.f

# Files dropped from the migrated archive:
#  - ZC*/DS* mixed-precision iterative-refinement drivers and
#    cross-precision converters (DLAG2S/SLAG2D/CLAG2Z/ZLAG2C/DLAT2S/
#    ZLAT2C) — not expressible in an extended-precision target.
#  - Precision-independent helpers (CHLA_TRANSTYPE / IEEECK / ILA* /
#    IPARAM2STAGE / IPARMQ / LA_CONSTANTS / LA_XISNAN / LSAMEN /
#    XERBLA / XERBLA_ARRAY) — these come from the standard-precision
#    archive ``lapack`` (built from the same Netlib sources without
#    -freal-8-real-16) which the migrated archive PUBLIC-links. The
#    extended-precision-only helpers (LA_CONSTANTS_EP / LA_XISNAN_EP)
#    DO ride in the migrated archive — they have no standard sibling.
skip_files:
  - ZCGESV
  - DSGESV
  - ZCPOSV
  - DSPOSV
  - DLAG2S
  - SLAG2D
  - CLAG2Z
  - ZLAG2C
  - DLAT2S
  - ZLAT2C
  - CHLA_TRANSTYPE
  - IEEECK
  - ILADIAG
  - ILAENV
  - ILAENV2STAGE
  - ILAPREC
  - ILATRANS
  - ILAUPLO
  - IPARAM2STAGE
  - IPARMQ
  - LA_CONSTANTS
  - LA_XISNAN
  - LSAMEN
  - XERBLA
  - XERBLA_ARRAY

# Multi-precision utility modules — copy unchanged. Note that
# LA_CONSTANTS and LA_XISNAN are also in skip_files above (the std-
# precision originals do not ride into the migrated archive); only the
# _EP and _MF siblings are actually emitted here. Listing the
# precision-independent stems anyway documents intent and is harmless
# (skip_files runs first).
copy_files:
  - LA_CONSTANTS_EP
  - LA_CONSTANTS_MF
  - LA_XISNAN_EP
  - LA_XISNAN_MF

# Reroute every ILAENV / ILAENV2STAGE / IPARAM2STAGE call site in
# migrated source to the *_EP variants shipped from
# recipes/lapack/extras/. The upstream env-inquiry helpers gate on
# the routine name's precision letter being one of S/D/C/Z; for
# migrated names like 'EGEMM' / 'PESYTTRD' / 'MSYTRD_2STAGE' the gate
# fires and the function returns *uninitialised* (ILAENV/ILAENV2STAGE)
# or -1 (IPARAM2STAGE). The *_EP variants accept E/Q/M (real) and
# Y/X/W (complex) on top of S/D/C/Z and initialise their result to 0
# as a safety net. See recipes/lapack/extras/*.f for the patched
# bodies. The original ILAENV/ILAENV2STAGE/IPARAM2STAGE entries are
# already in skip_files above, so this rename does not duplicate
# upstream symbols in the migrated archive.
extra_renames:
  ILAENV: ILAENV_EP
  ILAENV2STAGE: ILAENV2STAGE_EP
  IPARAM2STAGE: IPARAM2STAGE_EP
