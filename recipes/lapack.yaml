# Symmetric-patch CI escape hatch (Phase D). All current LAPACK patches
# touch only the D/Z halves of their co-family. Some real upstream
# bugs (L01 ?orbdb3, X01 ?orbdb / ?unbdb) DO have S/C patches in this
# list — but the verify-patches sibling-set heuristic doesn't yet
# understand the orthogonal/unitary tail aliasing (dorbdb3 ↔ cunbdb3),
# so it flags them as missing. As that heuristic improves, the truly
# symmetric ones will be removed from this list automatically; the
# remainder represents work to add S/C patches in a future pass.
