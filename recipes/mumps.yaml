library: mumps
language: fortran
source_dir: external/MUMPS_5.9.0/src
extensions: [.F, .h]

# Per-arithmetic headers (*mumps_struc.h) live in a parallel include/
# directory, not src/. They are Fortran content (DOUBLE PRECISION / TYPE
# blocks) that must be migrated so ``INCLUDE 'dmumps_struc.h'`` in
# dmumps_struc_def.F resolves against the renamed output header
# (qmumps_struc.h for kind16).
extra_fortran_dirs:
  - external/MUMPS_5.9.0/include

depends:
  - blas.yaml
  - lapack.yaml
  - scalapack.yaml

# C headers — pulled in by extensions:[.h] but handled separately by
# the (not-yet-written) C recipe. Skip here so the Fortran migrator
# doesn't mangle their C syntax.
skip_files:
  # include/ — arithmetic-prefixed C API headers
  - CMUMPS_C
  - DMUMPS_C
  - SMUMPS_C
  - ZMUMPS_C
  # include/ — shared C API headers
  - MUMPS_COMPAT
  - MUMPS_C_TYPES
  # src/ — C implementation headers
  - CMUMPS_GPU
  - DMUMPS_GPU
  - SMUMPS_GPU
  - ZMUMPS_GPU
  - MUMPS_ADDR
  - MUMPS_COMMON
  - MUMPS_CONFIG_FILE_C
  - MUMPS_FLYTES
  - MUMPS_IO
  - MUMPS_IO_BASIC
  - MUMPS_IO_ERR
  - MUMPS_IO_THREAD
  - MUMPS_METIS
  - MUMPS_METIS64
  - MUMPS_METIS_INT
  - MUMPS_PORD
  - MUMPS_REGISTER_THREAD
  - MUMPS_SAVE_RESTORE_C
  - MUMPS_SCOTCH
  - MUMPS_SCOTCH64
  - MUMPS_SCOTCH_INT
  - MUMPS_THREAD_AFFINITY
  # src/ — MPI-to-OpenMP work-distribution module (grew from a 16-line stub
  # in 5.8.2 to a 1007-line real module in 5.9.0). The whole module body and
  # all ~20 USE sites are wrapped in ``#if defined(MPI_TO_K_OMP)``, an opt-in
  # experimental feature never defined anywhere in the tree, so gfortran
  # preprocesses it all away: empty .o, no .mod, no consumers. It must be
  # *skipped* (dropped from staging) rather than copy_files'd: if copied, the
  # file lands in the staged tree and CMake's Fortran scanner over-approximates
  # the ``#if defined`` guard, sees ``MODULE MUMPS_MPITOOMP_M`` textually, and
  # schedules a cmake_copy_f90_mod for a .mod the preprocessor never emits →
  # "Error copying Fortran module" build failure. To enable the feature later,
  # drop this line and add ``-D MPI_TO_K_OMP`` globally (and validate it).
  - MUMPS_MPITOOMP_M

# Shared files to copy verbatim. Most shared modules aggregate
# working-precision data (mem/cost/flop/load counters) that cross into
# migrated arithmetic-specific callers, so they must be migrated — not
# copied — or callers hit "passed REAL(16) to REAL(8)" argument
# mismatches. The list below is only the files that truly carry no
# working precision or interface with external fixed-width APIs
# (MPI_WTIME, Scotch) that must stay at REAL(8).
copy_files:
  # Shared headers INCLUDEd by MUMPS Fortran sources. Text-only, no FP.
  - MUMPS_HEADERS              # src/mumps_headers.h
  - MUMPS_SAVE_RESTORE_MODES   # src/mumps_save_restore_modes.h
  - MUMPS_TAGS                 # src/mumps_tags.h

  - DOUBLE_LINKED_LIST  # integer-only generic data structure
  - BCAST_ERRORS        # integer status broadcast
  - MUMPS_VERSION       # string constants only
  - TOOLS_COMMON        # MPI_WTIME / MUMPS_SECDEB timing primitives
  - TOOLS_COMMON_M      # module wrapping tools_common
  - ANA_ORDERINGS              # Scotch / Metis interface (REAL(8) buffers)
  - ANA_ORDERINGS_WRAPPERS_M   # Scotch / Metis wrappers
  # fac_future_niv2_mod.F defines MUMPS_FUTURE_NIV2 — an INTEGER-only
  # module (DIMENSION(:), ALLOCATABLE :: FUTURE_NIV2). MUMPS_LOAD
  # (kept verbatim above) USEs it; if migrated as precision content
  # the .mod lands in ${LIB_PREFIX}mumps but mumps_common is built
  # first, so MUMPS_LOAD fails to resolve the .mod. Pin to copy_files
  # so the module sits in the common archive next to its consumer.
  # Note: copy_files matches uppercased filename basenames, not
  # module names — hence FAC_FUTURE_NIV2_MOD, not MUMPS_FUTURE_NIV2.
  - FAC_FUTURE_NIV2_MOD
  # estim_flops.F has cost-statistics subroutines that take
  # DOUBLE PRECISION arguments (FLOP1, FLOP2, COST, OPELIW, ...).
  # Every caller in the migrated tree keeps these as DOUBLE PRECISION
  # — MUMPS_LR_STATS (kept verbatim above) calls in directly, and
  # qfac_front_type2_aux.F's FLOP1/FLOP2 declarations are preserved
  # via the keep-kind manifest. Migrating estim_flops.F promotes
  # MUMPS_GET_FLOPS_COST's COST argument to REAL(KIND=16), which
  # then writes 16 bytes into an 8-byte caller buffer — silent
  # corruption that surfaces as a SIGSEGV during the factorization
  # phase (qmumps_fac_stack_ → mumps_get_flops_cost_ →
  # 8-byte stack buffer overrun). Pin to copy_files to keep the
  # whole file at DOUBLE PRECISION.
  - ESTIM_FLOPS

  # MUMPS_MEMORY_MOD bundles S/D/C/Z reallocators under a single
  # generic MUMPS_REALLOC interface. Migrating it directly collapses
  # MUMPS_S/DREALLOC → MUMPS_QREALLOC, producing duplicate MODULE
  # PROCEDURE entries. Instead we keep the upstream module verbatim
  # and provide a hand-written ``MUMPS_MEMORY_MOD_EP`` via overrides
  # that re-exports the originals and adds Q/X variants. Migrated
  # callers are redirected from MUMPS_MEMORY_MOD to MUMPS_MEMORY_MOD_EP
  # via ``module_renames`` below.
  - MUMPS_MEMORY_MOD
  # MUMPS_LR_STATS holds DP flop/memory counters shared across
  # arithmetics. Callers keep DP via keep-kind manifest; keep this
  # module verbatim to preserve the DP interface. Its one caller that
  # passed a working-precision value (COMPUTE_GLOBAL_GAINS with
  # id%RINFOG(3)) is handled by call_arg_casts below — the upstream
  # s/c drivers already dble()-cast it; we restore that cast so the
  # verbatim DP routine is called directly (no bridge, no rename).
  - LR_STATS
  # MUMPS_LOAD tracks DP work/memory balancing counters across ranks.
  # Callers keep DP for load increments (INC_LOAD etc.); keep verbatim.
  - MUMPS_LOAD
  # MUMPS_BUF_BCAST_ARRAY etc. take DP MEM/FLOPS/CB increments directly
  # from the MUMPS_LOAD counters. Keep verbatim so the DP interface is
  # preserved end-to-end across the broadcast.
  - MUMPS_COMM_BUFFER_COMMON
  # mumps_static_mapping holds DP tree-distribution state shared across
  # arithmetics (cv_costw / cv_costm, subtree traversal costs). Integer
  # mapping tables plus DP accumulators — no working-precision interface.
  - MUMPS_STATIC_MAPPING
  # MUMPS_LR_COMMON: integer-only constants / size helpers. In 5.9.0 the
  # file ALSO carries the mixed-precision low-rank (LRMIXED) FP helpers
  # (MUMPS_LRMIXED_CAST_*/PLUS_*/?GEMM), but only for the genuine s/d/c/z
  # arithmetics — the file is precision-multiplexed and hardcodes every
  # genuine pair, so it stays byte-identical in the shared common. The
  # extended-prefix dispatchers in the migrated ?lr_core.F call renamed
  # helper symbols (CAST_QD, QGEMM, ...) with no genuine definition here;
  # those are supplied as unreachable abort-stubs by the per-target
  # lr_common_ext.F overrides below (see the overrides: section).
  - LR_COMMON

  # --- Arithmetic-independent common modules --------------------------
  # These 10 modules define unprefixed MUMPS_* symbols the migrator was
  # bundling into every ${LIB_PREFIX}mumps archive. They carry no
  # working-precision interface, so migrating them only over-promoted
  # internal fixed doubles (cost/flop counters) — which made the kind16
  # and kind10 copies *semantically diverge* despite identical symbol
  # names, blocking a single all-precision binary. Pinned verbatim so
  # they are byte-identical across targets and can live once in the
  # shared common archive.
  # (copy_files matches uppercased filename basenames, not module names.)
  - ANA_OMP_M                    # MUMPS_ANA_OMP_M: all-integer interface; ARITH is a runtime CHARACTER(1); DP is OMP cost-model scratch
  - ANA_BLK_M                    # MUMPS_ANA_BLK_M: COL_LMATRIX_T/LMATRIX_T/COMPACT_GRAPH_T are integer/pointer only
  - FAC_ASM_BUILD_SORT_INDEX_M   # MUMPS_BUILD_SORT_INDEX_M: integer sort/index; float dep only via MUMPS_TPS_M
  - FAC_ASM_BUILD_SORT_INDEX_ELT_M  # MUMPS_BUILD_SORT_INDEX_ELT_M: same; USE MUMPS_TPS_M
  - FAC_DESCBAND_DATA_M          # MUMPS_FAC_DESCBAND_DATA_M: DESCBAND_STRUC_T = integer + integer pointer
  - FAC_MAPROW_DATA_M            # MUMPS_FAC_MAPROW_DATA_M: MAPROW_STRUC_T = integer + integer pointers
  - FRONT_DATA_MGT_M             # MUMPS_FRONT_DATA_MGT_M: FDM_STRUC_T = integer + integer pointers
  - MUMPS_INTR_TYPES_COMMON      # MUMPS_INTR_TYPES: MUMPS_ROOT_STRUC all INTEGER/LOGICAL (WP root data lives in the prefixed ?MUMPS_ROOT_STRUC)
  - SOL_OMP_COMMON_M             # MUMPS_SOL_L0OMP_M: no float/type declarations; two integer subs on K400
  # MUMPS_TPS_M's MUMPS_TPS_T is integer except DOUBLE PRECISION ::
  # OPASSW, OPELIW — declared DOUBLE PRECISION in every s-file too, so
  # they are genuine flop counters, not working precision. Keeping the
  # type verbatim also un-diverges the two MUMPS_BUILD_SORT_INDEX*
  # modules that USE it (their layout depended on TPS_T's size).
  - OMP_TPS_COMMON_M             # MUMPS_TPS_M

  # --- Complete the genuine 36-file common ----------------------------
  # Full unification: the migrated ``mumps_common`` becomes the *entire*
  # upstream shared common so genuine s/c/d/z and the extended prefixes
  # (e/y, q/x, m/w) all link one common — retiring the parallel genuine
  # ``dzmumps_common`` target. Upstream compiles these 36 files once into
  # libmumps_common and links them into libsmumps/libdmumps/libcmumps/
  # libzmumps alike, so by construction none takes an arithmetic-specific
  # argument; extended precision is just one more working precision served
  # by the same objects. These 11 were the last still classified as
  # precision by the file-stem heuristic; each was scanned and carries no
  # working-precision interface. (Matches uppercased basenames.)
  - ANA_AMDMF          # AMD/AMF ordering: only float is THRESM, a local INTEGER-derived threshold
  - ANA_BLK            # block analysis: NBBLOCK-style integer counts; USE only MUMPS_ANA_BLK_M/MUMPS_TOOLS_COMMON_M (both common)
  - ANA_SET_ORDERING   # integer-only ordering selection
  - MUMPS_L0_OMP_M     # MUMPS_L0OMP_M: integer L0-OMP thread/tree bookkeeping, no float decls
  - MUMPS_OOC_COMMON   # OOC control flags/units, all INTEGER/LOGICAL (WP OOC buffers live in the arith solvers)
  - MUMPS_PIVNUL_MOD   # null-pivot index bookkeeping, all INTEGER (WP thresholds live in the arith solvers)
  - MUMPS_PRINT_DEFINED  # INTEGER/LOGICAL diagnostic print flags
  # mumps_type2_blocking's only reals are single-precision REAL cost
  # heuristics (Wmaster, block costs). REAL FUNCTION MUMPS_BLOC2_COUT is
  # self-contained (no external caller expects a promoted return); the
  # type2 subroutines arith solvers call take integer control-array args.
  - MUMPS_TYPE2_BLOCKING
  - SOL_COMMON         # integer solve index/mapping helpers (unprefixed common; formerly excluded from the s*.F glob)
  - SOL_DS_COMMON_M    # integer distributed-solution solve helper

# Redirect ``USE MUMPS_MEMORY_MOD`` in migrated callers to the
# hand-written EP module that provides Q/X reallocators. The upstream
# module is kept verbatim via copy_files above.
module_renames:
  MUMPS_MEMORY_MOD: MUMPS_MEMORY_MOD_EP

# Restore call-site DP down-casts the upstream s/c drivers perform but
# the canonical d/z drivers omit. COMPUTE_GLOBAL_GAINS (in the verbatim
# MUMPS_LR_STATS, copy_files above) takes a DOUBLE PRECISION FLOP_NUMBER.
# The d/z drivers pass id%RINFOG(3) raw because RINFOG is DOUBLE there;
# after migration RINFOG is the target working precision, so the raw arg
# no longer matches the DP dummy. The s/c drivers already wrap it in
# dble() (sfac_driver.F:3673 / cfac_driver.F:3674, shielded by the
# keep-kind manifest); we inject the same cast into the d/z output. This
# retires the former per-target mumps_lr_stats_ep bridge and lets the one
# COMPUTE_GLOBAL_GAINS live once in the shared common archive. Applied
# post-migration so the injected dble() is not re-promoted. ``id%RINFOG(3)``
# occurs exactly once in each driver (the call site), so the literal
# rewrite is surgical.
call_arg_casts:
  - {file: dfac_driver.F, find: "id%RINFOG(3)", wrap: dble}
  - {file: zfac_driver.F, find: "id%RINFOG(3)", wrap: dble}

# The C bridge's Fortran-callable scaling/RHS/singular-value callbacks
# are DEFINED in mumps_c.c (F_SYM_ARITH → dmumps_assign_colsca_ etc.),
# which the Fortran migrator never scans, so the classifier can't pair
# or rename them. But the migrated *.F CALL these callbacks by their
# d/z-prefixed names — left untouched they resolve to the plain-double
# bridge's symbols, leaking d/z into an extended-precision build and
# colliding with the genuine dmumps_c/zmumps_c bridge. Force-rename the
# call sites to the target prefix here; the bridge object is renamed to
# match via mumps_c_types_extended.h (see cmake/CMakeLists.txt). {RPU}
# = real prefix upper (E/Q/M ← upstream d), {CPU} = complex (Y/X/W ← z).
extra_renames:
  # Task 44: the extended stack's BLACS/ScaLAPACK-common engine is
  # privatized under ep_ so it never shares a symbol (or state) with an
  # MKL linked into the same consumer. The migrated MUMPS trees call
  # four family-independent routines by their pristine names
  # (?fac/?sol_root_parallel.F, ?type3_root.F, ?end_driver.F,
  # ?mumps_save_restore.F); left untouched they would bind to MKL's
  # engine while the pm*/pw* ScaLAPACK routines operate on grids from
  # the ep engine — the exact cross-engine mix behind the np>=2
  # SIGSEGV. Redirect them to the ep twins (defined in
  # libepblacs_common / libepscalapack_common). The genuine s/d/c/z
  # MUMPS build stages these files verbatim (no migration), so it
  # keeps pristine names and MKL compatibility.
  BLACS_GRIDINIT: EP_BLACS_GRIDINIT
  BLACS_GRIDINFO: EP_BLACS_GRIDINFO
  BLACS_GRIDEXIT: EP_BLACS_GRIDEXIT
  DESCINIT:       EP_DESCINIT

  DMUMPS_ASSIGN_COLSCA:          "{RPU}MUMPS_ASSIGN_COLSCA"
  DMUMPS_ASSIGN_COLSCA_LOC:      "{RPU}MUMPS_ASSIGN_COLSCA_LOC"
  DMUMPS_ASSIGN_RHSINTR:         "{RPU}MUMPS_ASSIGN_RHSINTR"
  DMUMPS_ASSIGN_ROWSCA:          "{RPU}MUMPS_ASSIGN_ROWSCA"
  DMUMPS_ASSIGN_ROWSCA_LOC:      "{RPU}MUMPS_ASSIGN_ROWSCA_LOC"
  DMUMPS_ASSIGN_SINGULAR_VALUES: "{RPU}MUMPS_ASSIGN_SINGULAR_VALUES"
  DMUMPS_NULLIFY_C_COLSCA:       "{RPU}MUMPS_NULLIFY_C_COLSCA"
  DMUMPS_NULLIFY_C_COLSCA_LOC:   "{RPU}MUMPS_NULLIFY_C_COLSCA_LOC"
  DMUMPS_NULLIFY_C_RHSINTR:      "{RPU}MUMPS_NULLIFY_C_RHSINTR"
  DMUMPS_NULLIFY_C_ROWSCA:       "{RPU}MUMPS_NULLIFY_C_ROWSCA"
  DMUMPS_NULLIFY_C_ROWSCA_LOC:   "{RPU}MUMPS_NULLIFY_C_ROWSCA_LOC"
  DMUMPS_NULLIFY_C_SING_VALUES:  "{RPU}MUMPS_NULLIFY_C_SING_VALUES"
  DMUMPS_SET_TMP_PTR_C:          "{RPU}MUMPS_SET_TMP_PTR_C"
  ZMUMPS_ASSIGN_COLSCA:          "{CPU}MUMPS_ASSIGN_COLSCA"
  ZMUMPS_ASSIGN_COLSCA_LOC:      "{CPU}MUMPS_ASSIGN_COLSCA_LOC"
  ZMUMPS_ASSIGN_RHSINTR:         "{CPU}MUMPS_ASSIGN_RHSINTR"
  ZMUMPS_ASSIGN_ROWSCA:          "{CPU}MUMPS_ASSIGN_ROWSCA"
  ZMUMPS_ASSIGN_ROWSCA_LOC:      "{CPU}MUMPS_ASSIGN_ROWSCA_LOC"
  ZMUMPS_ASSIGN_SINGULAR_VALUES: "{CPU}MUMPS_ASSIGN_SINGULAR_VALUES"
  ZMUMPS_NULLIFY_C_COLSCA:       "{CPU}MUMPS_NULLIFY_C_COLSCA"
  ZMUMPS_NULLIFY_C_COLSCA_LOC:   "{CPU}MUMPS_NULLIFY_C_COLSCA_LOC"
  ZMUMPS_NULLIFY_C_RHSINTR:      "{CPU}MUMPS_NULLIFY_C_RHSINTR"
  ZMUMPS_NULLIFY_C_ROWSCA:       "{CPU}MUMPS_NULLIFY_C_ROWSCA"
  ZMUMPS_NULLIFY_C_ROWSCA_LOC:   "{CPU}MUMPS_NULLIFY_C_ROWSCA_LOC"
  ZMUMPS_NULLIFY_C_SING_VALUES:  "{CPU}MUMPS_NULLIFY_C_SING_VALUES"
  ZMUMPS_SET_TMP_PTR_C:          "{CPU}MUMPS_SET_TMP_PTR_C"

# Hand-written modules that cannot be produced by mechanical migration.
# Applied per-target since the EP variants listed in each file depend
# on which extended-precision kinds the target build enables.
#
# lr_common_ext.F: fail-loud abort stubs for the extended-arithmetic
# MUMPS_LRMIXED_* helpers that the migrated ?lr_core.F dispatchers
# reference but the (verbatim, genuine-only) lr_common.F never defines.
# The migrator's suffix rename is many-to-one, so it cannot synthesise
# correct helpers; and mixed-precision low-rank has no meaning for the
# byte-packed extended formats. Every stub is unreachable at runtime
# (gated by KEEP(448)>=1 .AND. KEEP(450)/=0, default off) and aborts if
# ever forced on. Each target defines only its own two arithmetics'
# symbols (disjoint across trees) so nothing is multiply-defined when all
# three precision archives link into one binary. These land in
# mumps_PRECISION_SOURCES (per-target), never the shared common.
overrides:
  kind16:
    src_dir: mumps
    files:
      - mumps_memory_mod_ep.F
      - lr_common_ext.F
  kind10:
    src_dir: mumps/kind10
    files:
      - mumps_memory_mod_ep.F
      - lr_common_ext.F
  multifloats:
    src_dir: mumps/multifloats
    files:
      - mumps_memory_mod_ep.F
      - lr_common_ext.F

# Per-line keep-kind manifest for DOUBLE PRECISION declarations in
# paired s*/d* and c*/z* files that must not be promoted. Generated by
# `scripts/mumps_sweep_keep_kind.py`. See recipes/README.md for rationale.
keep_kind_manifest: mumps/keep-kind.manifest


# Convergence whitelist (Phase D). MUMPS S/D halves are maintained
# by upstream as separately hand-edited copies — they don't converge
# at the source level upstream either. The 162/200 divergences are
# expected; the guarantee that matters for MUMPS is differential-
# precision parity at the test level (currently 26/26). See
# doc/archive/convergence-20260507.md §mumps.
defer_all_divergences: true
