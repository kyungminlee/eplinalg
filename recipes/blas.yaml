library: blas
language: fortran
source_dir: external/lapack-3.12.1/BLAS/SRC
extensions: [.f, .f90]

symbols:
  method: scan_source

prefix:
  style: direct

# Files dropped entirely from the migrated archive:
#  - DSDOT / SDSDOT — cross-precision routines (single+double mixed).
#    No single-kind target; not migratable to extended precision.
#  - LSAME / XERBLA / XERBLA_ARRAY — precision-independent helpers.
#    They live in the standard-precision archive ``blas`` (built from
#    the same Netlib sources without -freal-8-real-16) which the
#    migrated archive PUBLIC-links — no need to ship a duplicate copy
#    in the extended-precision archive.
skip_files:
  - DSDOT
  - SDSDOT
  - LSAME
  - XERBLA
  - XERBLA_ARRAY

# Patches applied to the staged source tree (build/staged-sources/blas/)
# before migration. Each patch is a unified diff against the upstream
# source. See doc/refactor-20260509.md.
#
# B01: dnrm2/dznrm2 originally embed Blue's scaling constants
# (tsml/tbig/ssml/sbig) as inline parameter declarations. On the
# multifloats target the migrator's nuke-rename turns those references
# into imports of upstream multifloats's DD_TSML/DD_TBIG/DD_SSML/
# DD_SBIG, which use 1e±100 / 1e±50 magnitudes. Those values cause
# `(ax * sbig)^2` to overflow at fp64 once ax exceeds ~1e+104,
# breaking dgesvj's protect-from-underflow up-scaling pass. The
# rewrite re-routes the imports through LA_CONSTANTS so the migrator
# dispatches to LA_CONSTANTS_MF (corrected) / LA_CONSTANTS_EP (already
# correct) per target. drotg/zrotg PARAMETER initializers use
# `radix(0._wp)**max(...)` and `sqrt(safmin)`; ** and sqrt are
# user-defined for the multifloats target's real64x2 / cmplx64x2
# types, so gfortran rejects them in PARAMETER context. The rewrite
# moves the constants to SAVE-then-init-at-first-call. kind10/kind16
# unaffected.
patches:
  - B01__nrm2-rotg-lazy-init.patch

# Convergence whitelist (Phase D, doc/refactor-20260509.md).
# Stems where divergence is expected and not a regression. Audit
# documented in doc/convergence-20260507.md §blas:
#   DNRM2/DZNRM2/DROTG/ZROTG: B01 patches D/Z only; S/C halves
#     re-migrate without the lazy-init form (no S/C override exists,
#     since the workaround is multifloats-target-only).
#   DDOT: upstream STEMP/SDOT vs DDOT/DTEMP line-swap (delete+insert
#     reordering that _filter_precision_drift intentionally doesn't
#     fold).
#   DROTMG: upstream constants drift (different DATA GAM/GAMSQ/RGAMSQ
#     and conditional structure between S and D halves).
#   DZASUM: upstream code-shape drift (D delegates to DCABS1, S
#     inlines ABS+AIMAG).
expected_divergences:
  - DDOT
  - DGEMMTR
  - DNRM2
  - DROTG
  - DROTMG
  - DZASUM
  - DZNRM2
  - ZROTG

# Symmetric-patch CI escape hatch (Phase D). Every B01 hunk touches
# the D/Z file only — the S/C halves don't have an equivalent
# multifloats workaround (the build issue is target-specific to
# kind16/multifloats which always picks the D/Z half as canonical).
# When/if S/C overrides are added, remove their patches from this
# list so verify-patches enforces co-family symmetry.
asymmetric_patches:
  - B01__nrm2-rotg-lazy-init.patch
