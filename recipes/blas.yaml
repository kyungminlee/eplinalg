library: blas
language: fortran
source_dir: external/lapack-3.12.1/BLAS/SRC
extensions: [.f, .f90]

# Files dropped entirely from the migrated archive:
#  - DSDOT / SDSDOT — cross-precision routines (single+double mixed).
#    No single-kind target; not migratable to extended precision.
#  - LSAME / XERBLA / XERBLA_ARRAY — precision-independent helpers.
#    They live in the standard-precision archive ``blas`` (built from
#    the same Netlib sources without -freal-8-real-16) which the
#    migrated archive PUBLIC-links — no need to ship a duplicate copy
#    in the extended-precision archive.
skip_files:
  - DSDOT
  - SDSDOT
  - LSAME
  - XERBLA
  - XERBLA_ARRAY

# Patches applied to the staged source tree (build/staged-sources/blas/)
# before migration. Each patch is a unified diff against the upstream
# source. See doc/archive/refactor-20260509.md.
#
# B01: dnrm2/dznrm2 originally embed Blue's scaling constants
# (tsml/tbig/ssml/sbig) as inline PARAMETER declarations. On the
# multifloats target the migrator's nuke-rename turns those references
# into imports of upstream multifloats's DD_TSML/DD_TBIG/DD_SSML/
# DD_SBIG, which use 1e±100 / 1e±50 magnitudes. Those values cause
# `(ax * sbig)^2` to overflow at fp64 once ax exceeds ~1e+104,
# breaking dgesvj's protect-from-underflow up-scaling pass. The
# rewrite renames the locals to `btsml/btbig/bssml/bsbig` (so the
# migrator's nuke-rename no longer matches them) and switches them
# from PARAMETER to SAVE-then-init-at-first-call. drotg/zrotg get the
# same SAVE-then-init treatment because their PARAMETER initializers
# use `radix(0._wp)**max(...)` and `sqrt(safmin)` — ** and sqrt are
# user-defined for multifloats's real64x2 / cmplx64x2, so gfortran
# rejects them in PARAMETER context. The structural rewrite fires on
# every target; kind10/kind16 stay numerically equivalent.
patches:
  - B01__nrm2-rotg-lazy-init.patch
  - B01_SC__nrm2-rotg-lazy-init.patch

# Convergence whitelist (Phase D, doc/archive/refactor-20260509.md).
# Audit in doc/archive/convergence-20260507.md §blas:
#   DDOT: upstream STEMP/SDOT vs DDOT/DTEMP line-swap (independent
#     zero-init assignments emitted in different order — semantically
#     equivalent but textually divergent).
#   DROTMG: upstream constants drift (different DATA GAM/GAMSQ/RGAMSQ
#     between S and D halves: 1.67772E7 vs 16777216, 5.96046E-8 vs
#     5.9604645E-8).
#   DZASUM: upstream code-shape drift (D delegates to DCABS1, S
#     inlines ABS+AIMAG).
expected_divergences:
  - DDOT
  - DROTMG
  - DZASUM

# Symmetric-patch CI escape hatch (Phase D). B01 originally patched
# only the D/Z half; B01_SC extends it to the S/C halves
# (snrm2/scnrm2/srotg/crotg) so the lazy-init pattern is applied
# symmetrically. With both patches landed, the asymmetry list is
# empty.
asymmetric_patches: []
